<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* 🎯 BASE */
body {
    background: #f5f7fa;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #2e2e2e;
}

/* 🎯 CARD */
.card {
    border: 1px solid #e4e7ec;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: none;
}

/* 🎯 HEADER */
.header-quiz {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

/* 🎯 INPUT TÍTULO */
.titulo-input {
    border: none;
    border-bottom: 1px solid #d0d5dd;
    font-size: 16px;
    font-weight: 500;
    background: transparent;
    width: 260px;
}

.titulo-input:focus {
    outline: none;
    border-color: #2563eb;
}

/* 🎯 BOTONES */
.btn-sm-custom {
    font-size: 11px;
    padding: 5px 10px;
}

/* estilos tipo SAP / enterprise */
.btn-vf {
    background: #e8f5e9;
    color: #2e7d32;
}

.btn-multi {
    background: #e3f2fd;
    color: #1565c0;
}

.btn-ia {
    background: #fff3cd;
    color: #8a6d3b;
}

.btn-dark {
    background: #1f2937;
    color: white;
}

/* 🎯 INPUTS */
input.form-control {
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 12px;
    height: 32px;
}

/* 🎯 TABLA */
.table th {
    font-size: 10px;
}

.table td {
    font-size: 11px;
    vertical-align: middle;
}

/* 🎯 BADGES */
.badge-tipo {
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 4px;
}

.vf {
    background: #ecfdf3;
    color: #027a48;
}

.mc {
    background: #eef4ff;
    color: #3538cd;
}

/* ===================================== */
/* 🔥 MODAL NIVEL SAAS */
/* ===================================== */

.modal-content {
    border: none;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.modal-header {
    border-bottom: 1px solid #eaecf0;
    padding: 12px 16px;
}

.modal-title {
    font-size: 14px;
    font-weight: 600;
    color: #344054;
}

.modal-body {
    padding: 16px;
}

.modal-footer {
    border-top: 1px solid #eaecf0;
    padding: 10px 16px;
}

/* inputs dentro del modal */
.modal input,
.modal textarea,
.modal select {
    font-size: 11px;
    border-radius: 6px;
}

.modal label {
    font-size: 11px;
    color: #667085;
    margin-bottom: 4px;
}

/* inputs */
.modal input,
.modal textarea {
    border: 1px solid #d0d5dd;
    padding: 6px 10px;
}

/* focus limpio */
.modal input:focus,
.modal textarea:focus {
    border-color: #2563eb;
    box-shadow: none;
}

/* spacing elegante en opciones */
.opcion-edit {
    margin-bottom: 6px;
}

/* 🔥 OVERLAY (no mueve layout) */
#overlayLoader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(2px);

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

/* caja centrada */
.loader-box {
    background: white;
    padding: 16px 20px;
    border-radius: 8px;
    width: 300px;

    border: 1px solid #e4e7ec;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.loader-text {
    font-size: 12px;
    margin-bottom: 8px;
    color: #344054;
}

/* barra */
.progress {
    height: 6px;
    background: #e5e7eb;
    border-radius: 4px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #2563eb;
    transition: width 0.3s ease;
}
    </style>
</head>

<body>

    <form method="POST" id="formQuiz">

        <div class="container mt-4">

            <!-- HEADER -->
            <div class="card p-3 mb-3 shadow-sm">
                <div class="header-quiz d-flex flex-column gap-2">
                    <div class="d-flex justify-content-between align-items-start w-100">

                        <!-- 🔹 izquierda -->
                        <input type="text" id="titulo" name="titulo"
                            class="titulo-input"
                            placeholder="Título del Quiz">

                        <!-- 🔥 derecha: bloque profesional -->
                        <div class="p-2 border rounded bg-light" style="font-size:11px; min-width:420px;">

                            <div style="font-weight:600; color:#344054; margin-bottom:4px;">
                                Configuración
                            </div>

                            <div class="row">

                                <!-- 🔹 columna 1 -->
                                <div class="col-6">

                                    <div class="form-check mb-1">
                                        <input class="form-check-input"
                                            type="checkbox"
                                            id="multiple_intentos"
                                            name="multiple_intentos"
                                            checked
                                            onchange="togglePoliticaIntentos()">
                                        <label class="form-check-label">
                                            Múltiples intentos
                                        </label>
                                    </div>
                                    <div class="form-check mb-1">
                                        <input class="form-check-input"
                                            type="checkbox"
                                            id="enviar_solucionario"
                                            name="enviar_solucionario">
                                        <label class="form-check-label">
                                            Enviar solucionario
                                        </label>
                                    </div>
                                </div>

                                <!-- 🔹 columna 2 -->
                                <div class="col-6">
                                    <div id="bloquePoliticaIntentos" class="ms-2">
                                        <div class="form-check">
                                            <input class="form-check-input"
                                                type="radio"
                                                name="politica_intentos"
                                                value="add"
                                                checked>
                                            <label class="form-check-label">
                                                Adicionar Intentos
                                            </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input"
                                                type="radio"
                                                name="politica_intentos"
                                                value="max" 
                                                disabled 
                                                data-bs-toggle="tooltip"
                                                data-bs-title="Próximamente">
                                            <label class="form-check-label text-muted" style="font-size:10px;">
                                                Nota más alta <span style="font-size:9px; color:#53f708;">(próx.)</span>
                                            </label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input"
                                                type="radio"
                                                name="politica_intentos"
                                                value="ultimo" 
                                                disabled 
                                                data-bs-toggle="tooltip"
                                                data-bs-title="Próximamente">
                                            <label class="form-check-label text-muted">
                                                Último intento<span style="font-size:9px; color:#53f708;">(próx.)</span>
                                            </label>
                                        </div>

                                    </div>
                                    
                                    <!-- 🔥 espacio para escalar 
                                    <div class="text-muted" style="font-size:10px;">
                                        (Más opciones aquí…)
                                    </div>-->

                                </div>

                            </div>

                        </div>

                    </div>

    
                    <div class="d-flex gap-2">

                        <button type="button"
                            class="btn btn-vf btn-sm-custom"
                            onclick="crearPreguntaVF()">
                            + VF
                        </button>

                        <button type="button"
                            class="btn btn-multi btn-sm-custom"
                            onclick="crearPreguntaMultiple()">
                            + Múltiple
                        </button>

                        <button type="button"
                            class="btn btn-ia btn-sm-custom"
                            onclick="abrirModalIA()">
                            ⚡ IA
                        </button>

                    </div>

                    <!-- 🔥 dejamos esto temporalmente comentado -->
                    <!--
                    <input type="text" id="promptIA" class="form-control form-control-sm" placeholder="Ej: 5 preguntas VF de Naruto">
                    <button type="button" class="btn btn-warning btn-sm-custom" onclick="generarIA()">Generar IA</button>
                    <input type="file" id="archivoExamen" class="form-control form-control-sm">
                    <button type="button" class="btn btn-dark btn-sm-custom" onclick="subirExamen()">Subir examen</button>
                    -->

                    <!-- 🔥 loader lo dejamos fuera del flujo principal -->
                    <div id="loaderIA" style="display:none;" class="mt-2">
                        <div class="alert alert-info py-2 mb-2">
                            Procesando con IA...
                        </div>

                        <div class="progress" style="height: 8px;">
                            <div id="barraProgreso" 
                                class="progress-bar progress-bar-striped progress-bar-animated" 
                                style="width: 100%">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LISTA -->
            <div class="card shadow-sm">
                <div class="card-body p-2">

                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width:40px">#</th>
                                <th style="width:90px">Tipo</th>
                                <th>Pregunta</th>
                                <th>Detalle</th>
                                <th style="width:150px">Respuesta</th>
                                <th style="width:120px">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPreguntas"></tbody>
                    </table>

                </div>
            </div>

            <!-- GUARDAR -->
            <div class="mt-3 text-end">
                <button type="button" class="btn btn-dark btn-sm-custom" onclick="guardarQuiz()">Guardar Quiz</button>
            </div>

        </div>

    </form>
    <!-- 🔥 MODAL AQUÍ (FUERA del form, pero dentro del body) -->
    <div class="modal fade" id="modalPregunta" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

        <div class="modal-header">
            <h5 class="modal-title">Editar Pregunta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="contenidoModal">
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm-custom" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary btn-sm-custom" onclick="guardarEdicion()">Guardar</button>
        </div>

        </div>
    </div>
</div>
<div class="modal fade" id="modalIA" tabindex="-1">
    <div class="modal-dialog modal-dialog-end" style="max-width:420px;">
        <div class="modal-content" style="height:70vh; border-radius:0;">

            <!-- header -->
            <div class="modal-header">
                <h5 class="modal-title">Generar con IA</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- body -->
            <div class="modal-body">

                <!-- 🔹 tipo de entrada -->
                <label class="mb-1">Fuente</label>
                <select id="tipoIA" class="form-control mb-3">
                    <option value="generar_prompt">Generar desde prompt</option>
                    <option value="generar_archivo">Generar desde archivo</option>
                    <option value="importar">Importar quiz (leer archivo)</option>
                </select>

                <!-- 🔹 prompt -->
                <div id="bloquePrompt">
                    <label>Instrucción</label>
                    <textarea id="promptIA_modal" class="form-control mb-3"
                        placeholder="Ej: 5 preguntas VF de historia"></textarea>
                </div>

                <!-- 🔹 archivo -->
                <div id="bloqueArchivo" style="display:none;">
                    <label>Subir archivo</label>
                    <input type="file" id="archivoIA_modal" class="form-control mb-3">
                </div>

                <!-- 🔹 configuración (SOLO para generación) -->
                <div id="bloqueConfigIA">

                    <label>Configuración</label>

                    <div class="d-flex gap-2 mb-2">
                        <input type="number" id="cantidadIA" class="form-control" placeholder="Cantidad">

                        <select id="tipoPreguntasIA" class="form-control">
                            <option value="vf">VF</option>
                            <option value="multiple">Múltiple</option>
                            <option value="mixto">Mixto</option>
                        </select>
                    </div>  
                </div>
            </div>

            <!-- footer -->
            <div class="modal-footer">
                <button class="btn btn-secondary btn-sm-custom" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button class="btn btn-dark btn-sm-custom" onclick="ejecutarIA()">
                    Generar
                </button>
            </div>

        </div>
    </div>
</div>

<script>
function abrirModalIA() {
    let modal = new bootstrap.Modal(document.getElementById('modalIA'));
    modal.show();
}
document.getElementById("tipoIA").addEventListener("change", function () {

    let tipo = this.value;

    let bloquePrompt = document.getElementById("bloquePrompt");
    let bloqueArchivo = document.getElementById("bloqueArchivo");
    let bloqueConfig = document.getElementById("bloqueConfigIA");

    if (tipo === "generar_prompt") {

        bloquePrompt.style.display = "block";
        bloqueArchivo.style.display = "none";
        bloqueConfig.style.display = "block";

    } else if (tipo === "generar_archivo") {

        bloquePrompt.style.display = "none";
        bloqueArchivo.style.display = "block";
        bloqueConfig.style.display = "block";

    } else if (tipo === "importar") {

        bloquePrompt.style.display = "none";
        bloqueArchivo.style.display = "block";
        bloqueConfig.style.display = "none"; // 🔥 clave

    }

});
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("tipoIA").dispatchEvent(new Event("change"));
});

let preguntas = [];
let contador = 1;
let preguntaEditando = null;
async function ejecutarIA() {

    let tipo = document.getElementById("tipoIA").value;

    // 🔥 cerrar modal
    let modal = bootstrap.Modal.getInstance(document.getElementById('modalIA'));
    if (modal) modal.hide();

    // 🔥 mostrar overlay + iniciar barra
    document.getElementById("overlayLoader").style.display = "flex";
    iniciarLoader();

    try {

        // 🔹 GENERAR DESDE PROMPT
        if (tipo === "generar_prompt") {

            setLoaderText("Generando preguntas desde prompt...");

            let cantidad = document.getElementById("cantidadIA").value;
            let tipoPreg = document.getElementById("tipoPreguntasIA").value;
            let prompt = document.getElementById("promptIA_modal").value;

            if (!prompt) {
                alert("Escribe un prompt");
                detenerLoader();
                return;
            }

            let response = await fetch("/generar_quiz_ia", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: prompt,
                    cantidad: cantidad,
                    tipo: tipoPreg
                })
            });

            if (!response.ok) throw new Error("Error IA");

            let data = await response.json();
            cargarDesdeIA(data);
        }

        // 🔹 IMPORTAR QUIZ
        else if (tipo === "importar") {

            setLoaderText("Leyendo archivo y convirtiendo preguntas...");

            let fileInput = document.getElementById("archivoIA_modal");

            if (fileInput.files.length === 0) {
                alert("Selecciona un archivo");
                detenerLoader();
                return;
            }

            let formData = new FormData();
            formData.append("archivo", fileInput.files[0]);

            let response = await fetch("/procesar_examen", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Error procesando archivo");

            let data = await response.json();
            cargarDesdeIA(data);
        }

        // 🔹 GENERAR DESDE ARCHIVO
        else if (tipo === "generar_archivo") {

            setLoaderText("Analizando contenido y generando preguntas...");

            let fileInput = document.getElementById("archivoIA_modal");
            let cantidad = document.getElementById("cantidadIA").value;
            let tipoPreg = document.getElementById("tipoPreguntasIA").value;

            if (fileInput.files.length === 0) {
                alert("Selecciona un archivo");
                detenerLoader();
                return;
            }

            if (!cantidad) {
                alert("Ingresa cantidad");
                detenerLoader();
                return;
            }

            let formData = new FormData();
            formData.append("archivo", fileInput.files[0]);
            formData.append("cantidad", cantidad);
            formData.append("tipo", tipoPreg);

            let response = await fetch("/generar_quiz_desde_archivo", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Error generando desde archivo");

            let data = await response.json();
            cargarDesdeIA(data);
        }

    } catch (error) {
        console.error(error);
        alert("Ocurrió un error con la IA");
    }

    // 🔥 SIEMPRE cerrar loader correctamente
    detenerLoader();
}
 
function crearPreguntaVF() {
    preguntas.push({
        id: contador++,
        tipo: "vf",
        texto: "Nueva pregunta VF",
        correcta: "Verdadero",
        explicacion: ""
    });

    renderTabla();
}

function togglePoliticaIntentos() {

    let enabled = document.getElementById("multiple_intentos").checked;

    // contenedor visual
    let bloque = document.getElementById("bloquePoliticaIntentos");

    // radios
    let radios = bloque.querySelectorAll("input[type='radio']");

    // visual (gris)
    bloque.style.opacity = enabled ? "1" : "0.4";

    // funcional (disable real)
    radios.forEach(r => {
        r.disabled = !enabled;
    });
}
document.addEventListener("DOMContentLoaded", () => {
    togglePoliticaIntentos();
}); 
document.addEventListener("DOMContentLoaded", function () {
    let tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    tooltipTriggerList.map(function (el) {
        return new bootstrap.Tooltip(el);
    });
}); 
document.querySelectorAll('input[name="politica_intentos"]').forEach(radio => {
    radio.addEventListener('click', function(e) {

        // si no es "add", bloquear
        if (this.value !== "add") {
            e.preventDefault();
        }
    });
});

function crearPreguntaMultiple() {
    preguntas.push({
        id: contador++,
        tipo: "multiple",
        texto: "Nueva pregunta múltiple",
        opciones: ["Opción 1", "Opción 2", "Opción 3", "Opción 4", "Opción 5"],
        correcta: "Opción 1"
    });

    renderTabla();
}
 
function renderTabla() {
    let tbody = document.getElementById("tablaPreguntas");
    tbody.innerHTML = "";

    preguntas.forEach((p, index) => {

        let tipoBadge = p.tipo === "vf"
            ? `<span class="badge-tipo vf">VF</span>`
            : `<span class="badge-tipo mc">MULTI</span>`;

        let detalle = "";

        if (p.tipo === "vf") {
            detalle = "Verdadero / Falso";
        } else {
            let letras = ["A","B","C","D","E"];

            detalle = p.opciones.map((op, i) => {
                let texto = (typeof op === "object") ? op.texto : op;
                return `${letras[i]}) ${texto}`;
            }).join("<br>");
        }

       let fila = `
            <tr>
                <td style="display:none;">
                    <input type="hidden" name="explicacion_${index + 1}" value="${p.explicacion}">
                </td>

                <td>${index + 1}</td>
                <td>${tipoBadge}</td>
                <td>${p.texto}</td>
                <td>${detalle}</td>
                <td>
                    <b>
                        ${
                            p.tipo === "vf"
                            ? p.correcta
                            : ["A","B","C","D","E"][parseInt(p.correcta) - 1]
                        }
                    </b>

                    <input type="hidden" name="correcta_${index + 1}" value="${p.correcta}">
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="editarPregunta(${p.id})">Editar</button>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="eliminarPregunta(${p.id})">X</button>
                </td>
            </tr>
        `;

        tbody.insertAdjacentHTML("beforeend", fila);
    });
}

function eliminarPregunta(id) {
    preguntas = preguntas.filter(p => p.id !== id);
    renderTabla();
}

 
function editarPregunta(id) {
    let pregunta = preguntas.find(p => p.id === id);
    preguntaEditando = pregunta;

    let html = `
        <label>Texto de la pregunta</label>
        <input type="text" id="edit_texto" class="form-control mb-2" value="${pregunta.texto}">
    `;

    // 🔥 CASO VERDADERO / FALSO
    if (pregunta.tipo === "vf") {

        let correctaVF = "";

// 🔥   soporta ambos formatos (IA y manual)
        if (Array.isArray(pregunta.opciones)) {

            if (typeof pregunta.opciones[0] === "object") {
                // caso IA
                let opCorrecta = pregunta.opciones.find(op => op.es_correcta);
                if (opCorrecta) correctaVF = opCorrecta.texto;

            } else {
                // caso manual
                correctaVF = pregunta.correcta || "";
            }
        }

        html += `
            <label>Respuesta correcta</label>
            <select id="edit_correcta" class="form-control mb-2">
                <option ${correctaVF === "Verdadero" ? "selected" : ""}>Verdadero</option>
                <option ${correctaVF === "Falso" ? "selected" : ""}>Falso</option>
            </select>

            <label>Explicación</label>
            <textarea id="edit_explicacion" class="form-control">${pregunta.explicacion || ""}</textarea>
        `;

    } else {

        // 🔹 MULTIPLE
        let letras = ["A", "B", "C", "D", "E"];

        pregunta.opciones.forEach((op, i) => {
            html += `
                <div class="d-flex align-items-center mb-1">
                    <span style="width:20px; font-size:12px; color:#6c757d;">
                        ${letras[i]}.
                    </span>
                    <input type="text" class="form-control opcion-edit" value="${op.texto || op}">
                </div>
            `;
        });

        // 🔥 obtener correcta
        let opCorrecta = pregunta.opciones.find(op => op.es_correcta);
        let correctaTexto = opCorrecta ? opCorrecta.texto : "";

        html += `
            <label>Respuesta correcta</label>
            <select id="edit_correcta" class="form-control">              
                ${pregunta.opciones.map((op, i) => {
                    let texto = (typeof op === "object") ? op.texto : op;
                    let letra = ["A","B","C","D","E"][i];

                    return `<option value="${i+1}" ${letra === pregunta.correcta ? "selected" : ""}>
                        ${letra}
                            </option>`;
                }).join("")}
            </select>
        `;
    }

    document.getElementById("contenidoModal").innerHTML = html;

    let modal = new bootstrap.Modal(document.getElementById('modalPregunta'));
    modal.show();
}
 
 
function guardarEdicion() {
    if (!preguntaEditando) return;

    preguntaEditando.texto = document.getElementById("edit_texto").value;

    if (preguntaEditando.tipo === "vf") {
        preguntaEditando.correcta = document.getElementById("edit_correcta").value;
        preguntaEditando.explicacion = document.getElementById("edit_explicacion").value;
    } else {
        let opciones = document.querySelectorAll(".opcion-edit");
        preguntaEditando.opciones = Array.from(opciones).map(o => o.value);
        preguntaEditando.correcta = document.getElementById("edit_correcta").value;
    }

    renderTabla();

    bootstrap.Modal.getInstance(document.getElementById('modalPregunta')).hide();
}
 
function guardarQuiz() {

    let form = document.getElementById("formQuiz");

    // limpiar inputs previos
    document.querySelectorAll(".hidden-input").forEach(e => e.remove());

    // título
    let titulo = document.getElementById("titulo").value;

    let inputTitulo = document.createElement("input");
    inputTitulo.type = "hidden";
    inputTitulo.name = "titulo";
    inputTitulo.value = titulo;
    inputTitulo.classList.add("hidden-input");
    form.appendChild(inputTitulo);

    // preguntas
    preguntas.forEach((p, index) => {

        let num = index + 1;

        agregarInput(form, `pregunta_${num}`, p.texto);
        agregarInput(form, `tipo_${num}`, p.tipo);

        if (p.tipo === "vf") {

            agregarInput(form, `correcta_${num}`, p.correcta);
            agregarInput(form, `explicacion_${num}`, p.explicacion || "");

        } else {

            p.opciones.forEach((op, i) => {
                agregarInput(form, `opcion_${num}_${i+1}`, op);
            });

            agregarInput(form, `correcta_${num}`, p.correcta);
            agregarInput(form, `explicacion_${num}`, p.explicacion || "");
        }
    });

    form.submit();
}

function agregarInput(form, name, value) {
    let input = document.createElement("input");
    input.type = "hidden";
    input.name = name;
    input.value = value;
    input.classList.add("hidden-input");
    form.appendChild(input);
}

    preguntas = data.map((p, index) => {

        console.log("DEBUG IA:", p.opciones, p.correcta);

        return {

                ? (
                    ["A","B","C","D","E"].includes(p.correcta)

async function subirExamen() {

    let fileInput = document.getElementById("archivoExamen");

    if (fileInput.files.length === 0) {
        alert("Selecciona un archivo");
        return;
    }

    // 🔥 mostrar overlay
    document.getElementById("overlayLoader").style.display = "flex";

    let barra = document.getElementById("barraReal");
    barra.style.width = "10%";

    let fakeProgress = setInterval(() => {
        let current = parseInt(barra.style.width);
        if (current < 90) {
            barra.style.width = (current + 10) + "%";
        }
    }, 300);

    let formData = new FormData();
    formData.append("archivo", fileInput.files[0]);

    try {
        let response = await fetch("/procesar_examen", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        if (!response.ok) {
            console.error("ERROR BACKEND:", data);
            alert("Error IA: revisa consola");
            document.getElementById("overlayLoader").style.display = "none";
            return;
        }

        barra.style.width = "100%";

        setTimeout(() => {
            document.getElementById("overlayLoader").style.display = "none";
            cargarDesdeIA(data);
        }, 300);

    } catch (error) {
        console.error(error);
        alert("Error conexión");
        document.getElementById("overlayLoader").style.display = "none";
    }
        clearInterval(fakeProgress);
    }

}

let intervaloLoader;

function iniciarLoader() {
    let barra = document.getElementById("barraReal");
    barra.style.width = "10%";

    intervaloLoader = setInterval(() => {
        let actual = parseInt(barra.style.width);
        if (actual < 90) {
            barra.style.width = (actual + 10) + "%";
        }
    }, 300);
}

function detenerLoader() {
    clearInterval(intervaloLoader);
    document.getElementById("barraReal").style.width = "100%";

    setTimeout(() => {
        document.getElementById("overlayLoader").style.display = "none";
    }, 300);
}
