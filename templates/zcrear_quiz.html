<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Crear Quiz</h2>

<form method="POST">

    <!-- Título -->
    <input type="text" name="titulo" class="form-control mb-3" placeholder="Título del Quiz" required>

    <!-- Preguntas -->
    <div id="preguntas"></div>

    <button type="button" class="btn btn-secondary" onclick="agregarPregunta()">+ Agregar Pregunta</button>

    <br><br>

    <button class="btn btn-primary">Guardar Quiz</button>

</form>

<script>
let contador = 0;

function agregarPregunta() {
    contador++;

    let html = `
    <div class="card p-3 mb-3">
        <input type="text" name="pregunta_${contador}" class="form-control mb-2" placeholder="Texto de la pregunta" required>

        <select name="tipo_${contador}" class="form-control mb-2" onchange="cambiarTipo(${contador})">
            <option value="vf">Verdadero / Falso</option>
            <option value="multiple">Opción múltiple</option>
        </select>

        <div id="opciones_${contador}"></div>
    </div>
    `;

    document.getElementById('preguntas').insertAdjacentHTML('beforeend', html);

    // cargar por defecto VF
    cambiarTipo(contador);
}

function cambiarTipo(id) {
    let tipo = document.querySelector(`[name="tipo_${id}"]`).value;
    let contenedor = document.getElementById(`opciones_${id}`);

    if (tipo === "vf") {
        contenedor.innerHTML = `
            <p><b>Opciones:</b></p>
            <input type="text" class="form-control mb-1" value="Verdadero" disabled>
            <input type="text" class="form-control mb-2" value="Falso" disabled>

            <select name="correcta_${id}" class="form-control mb-2">
                <option value="Verdadero">Verdadero</option>
                <option value="Falso">Falso</option>
            </select>

            <textarea name="explicacion_${id}" class="form-control" placeholder="Explicación (¿por qué es correcta?)" required></textarea>
        `;
    } else {
        contenedor.innerHTML = `
            <p><b>Opciones:</b></p>
            <input type="text" name="opcion_${id}_1" class="form-control mb-1" placeholder="Opción 1">
            <input type="text" name="opcion_${id}_2" class="form-control mb-1" placeholder="Opción 2">
            <input type="text" name="opcion_${id}_3" class="form-control mb-1" placeholder="Opción 3">
            <input type="text" name="opcion_${id}_4" class="form-control mb-1" placeholder="Opción 4">
            <input type="text" name="opcion_${id}_5" class="form-control mb-2" placeholder="Opción 5">

            <input type="text" name="correcta_${id}" class="form-control" placeholder="Respuesta correcta">
        `;
    }
}
</script>

</body>
</html>
