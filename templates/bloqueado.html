<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Intento no permitido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: "Segoe UI", sans-serif;
        }

        .contenedor {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-bloqueado {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .icono {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .titulo {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .mensaje {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
        }

        .btn-volver {
            margin-top: 20px;
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-volver:hover {
            background: #16a34a;
        }
    </style>

</head>

<body>

<div class="contenedor">

    <div class="card-bloqueado">

        <div class="icono">⛔</div>

        <div class="titulo">
            Intento no permitido
        </div>

        <div class="mensaje">
            Ya completaste<br>
            <b>{{ quiz_titulo }}</b><br>
            Este quiz solo permite un intento.
        </div>

        <button class="btn-volver" onclick="volver()">
            Volver
        </button>

    </div>

</div>

<script>
    function volver() {
        window.location.href = "/";
    }
</script>
<script>
    // bloquear navegación hacia atrás
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        history.go(1);
    };
</script>
<script>
    // si intenta recargar o volver, lo manda al inicio
    window.onload = function () {
        if (performance.navigation.type === 2) {
            window.location.href = "/";
        }
    };
</script>

</body>
</html>
