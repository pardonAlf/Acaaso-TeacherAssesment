<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar DNI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 text-center" style="width:350px;">
    <h3>Ingrese su DNI</h3>

    <form method="POST">
        <input type="text" name="dni" class="form-control my-3" placeholder="DNI" required>
        <button class="btn btn-success w-100">Ingresar</button>
    </form>
</div>

</body>
</html>
