<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Quiz</h2>

<form method="POST" action="/guardar_respuestas">

    {% for p in preguntas %}
        <div class="mb-4">
            <h5>{{ p.texto }}</h5>

            {% for op in p.opciones %}
                <div>
                    <input type="radio" name="pregunta_{{ p.id }}" value="{{ op[0] }}">
                    {{ op[1] }}
                </div>
            {% endfor %}
        </div>
    {% endfor %}

    <button class="btn btn-primary">Enviar</button>

</form>

</body>
</html>
