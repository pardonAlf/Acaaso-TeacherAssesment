<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Teacher Assessment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        /* 🔥 Inputs compactos profesionales */
        .form-control-sm {
            height: 20px !important;
            padding: 2px 7px !important;
            font-size: 10px !important;
        }

        .form-select {
            height: 20px !important;
            padding: 2px 7px !important;
            font-size: 10px !important;
            line-height: 12px;
        }

        /* 🔥 Labels más compactos */
        .form-label {
            font-size: 10px;
            margin-bottom: 1px;
        }

        /* 🔥 Espaciado más pequeño */
        .mb-2 {
            margin-bottom: 4px !important;
        }

        /* 🔥 Botones compactos */
        .btn-sm {
            padding: 3px 7px;
            font-size: 10px;
        }
        #password{
            margin-bottom: 5px;
        }
        /* 🔴 error visible fuerte */
        .input-error {
            border: 2px solid #dc3545 !important;
            background-color: #fff5f5 !important;
        }

        /* 🟢 válido */
        .input-ok {
            border: 2px solid #b2f0d3 !important;
            background-color: #f0fff4 !important;
        }
    </style>
</head>

<body class="bg-dark d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card p-4" style="width:350px;">
    <h3 class="text-center mb-3">Login</h3>

    <form method="POST">
        <input type="text" name="usuario" class="form-control mb-3" placeholder="Usuario" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
    </form>

    <div class="text-center mt-3">
        <a href="#" data-bs-toggle="modal" data-bs-target="#modalRegistro">
            ¿No tienes cuenta? Registrar
        </a>
    </div>
    
</div>
<div class="modal fade" id="modalRegistro" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Registro de Administrador</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" style="max-height: 75vh; overflow-y: auto;">

        <div class="row g-0"> 

             <!-- 🔹 IZQUIERDA (formulario) -->
            <div class="col-md-6 p-3">
                <form id="formRegistro">

                    <input type="text" id="usuario" class="form-control form-control-sm mb-2" placeholder="Usuario" required>
                     
                    <div class="row mb-2">
                    <div class="col-6">
                        <input type="password" id="password" class="form-control form-control-sm" placeholder="Password" required>
                        <input type="password" id="confirmPassword" class="form-control form-control-sm mb-1" placeholder="Confirmar Password" required>
                    </div>
                    <div class="col-6">
                         
                        <div style="font-size:11px; line-height:1.2;">
                            <div id="val-length" data-text="10 caracteres">❌ 10 caracteres</div>
                            <div id="val-upper" data-text="1 mayúscula">❌ 1 mayúscula</div>
                            <div id="val-lower" data-text="1 minúscula">❌ 1 minúscula</div>
                            <div id="val-number" data-text="1 número">❌ 1 número</div>
                            <div id="val-special" data-text="1 carácter especial">❌ 1 carácter especial</div>
                            <div id="val-match" data-text="coinciden">❌ coinciden</div>
                        </div>

                    </div>
                    </div>
                    <input type="text" id="dni" class="form-control form-control-sm mb-2" placeholder="DNI" required>
                    <div class="row mb-2">
                        <div class="col-6">
                            <input type="text" id="nombre" class="form-control form-control-sm" placeholder="Nombre" required>
                        </div>
                        <div class="col-6">
                            <input type="text" id="apellido" class="form-control form-control-sm" placeholder="Apellido" required>
                        </div>
                    </div>
                    <input type="email" class="form-control form-control-sm mb-2" placeholder="Correo" required>
                    <input type="email" class="form-control form-control-sm mb-2" placeholder="Confirmar Correo" required>
                    <select class="form-select mb-2" id="empresaSelect" required>
                        <option value="">Seleccionar empresa</option>

                        {% for e in empresas %}
                            <option value="{{ e[0] }}">{{ e[0] }}</option>
                        {% endfor %}

                        <option value="crear">+ Crear nueva empresa</option>
                    </select>
                    <label class="form-label small">Verificación</label>
                    <input type="text" 
                        id="codigoVerificacion" 
                        class="form-control form-control-sm mb-2" 
                        placeholder="Código de verificación" 
                        required>
                    
                    <div class="mb-2">
                        <div class="d-flex align-items-center gap-2 mb-2"> 
                            <div id="captchaTexto" 
                                style="background:#f1f3f5; padding:5px 8px; border-radius:6px; font-weight:bold; letter-spacing:2px;">
                            </div>

                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="generarCaptcha()">↻</button>

                            <input type="text" id="captchaInput" 
                                class="form-control form-control-sm" 
                                placeholder="Repetir Código" required>

                        </div> 
                    </div>
                    <button type="button" id="btnRegistrar" class="btn btn-primary w-100 mt-2">
                        Registrar
                    </button>

                </form>
            </div>
            <!-- 🔹 DERECHA (imagen) -->
            <div class="col-md-6 d-none d-md-block">

            <img src="{{ url_for('static', filename='img/registro.png') }}" 
                style="width:90%; height:90%; object-fit:cover; border-radius:6px;">
            
            </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalEmpresa" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Crear Empresa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="text" id="nombreEmpresa" class="form-control mb-3" placeholder="Nombre de la empresa">

        <button id="btnGuardarEmpresa" class="btn btn-success w-100">Guardar Empresa</button>

      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("btnGuardarEmpresa").addEventListener("click", function() {

    let nombre = document.getElementById("nombreEmpresa").value.trim();

    if (!nombre) {
        alert("Ingrese nombre de empresa");
        return;
    }

    let select = document.getElementById("empresaSelect");

    let option = document.createElement("option");
    option.value = nombre;
    option.text = nombre;

    // insertar antes de "crear"
    select.insertBefore(option, select.options[select.options.length - 1]);

    select.value = nombre;

    // cerrar modal correctamente
    let modalElement = document.getElementById('modalEmpresa');
    let modalInstance = bootstrap.Modal.getInstance(modalElement);
    modalInstance.hide();

    document.getElementById("nombreEmpresa").value = "";
});
 

 
document.getElementById("empresaSelect").addEventListener("change", function() {
    if (this.value === "crear") {

        let modal = new bootstrap.Modal(document.getElementById('modalEmpresa'));
        modal.show();

        // opcional: resetear selección
        this.value = "";
    }
});

document.addEventListener("DOMContentLoaded", function() {

    function validarPassword() {

        let pass = document.getElementById("password").value;
        let confirm = document.getElementById("confirmPassword").value;

        let length = pass.length >= 10;
        let upper = /[A-Z]/.test(pass);
        let lower = /[a-z]/.test(pass);
        let number = /[0-9]/.test(pass);
        let special = /[^A-Za-z0-9]/.test(pass);
        let match = pass === confirm && pass !== "";

        setEstado("val-length", length);
        setEstado("val-upper", upper);
        setEstado("val-lower", lower);
        setEstado("val-number", number);
        setEstado("val-special", special);
        setEstado("val-match", match);
    }

    function setEstado(id, estado) {
        let el = document.getElementById(id);
        if (!el) return;

        let texto = el.getAttribute("data-text");

        el.innerHTML = (estado ? "✔ " : "❌ ") + texto;
        el.style.color = estado ? "green" : "red";
    }

    let passInput = document.getElementById("password");
    let confirmInput = document.getElementById("confirmPassword");

    if (passInput && confirmInput) {
        passInput.addEventListener("input", validarPassword);
        confirmInput.addEventListener("input", validarPassword);
    }

});
 
function generarCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let captcha = "";

    for (let i = 0; i < 5; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("captchaTexto").innerText = captcha;
}

// generar al cargar
document.addEventListener("DOMContentLoaded", generarCaptcha);
</script>
<script>
document.getElementById("btnRegistrar").addEventListener("click", function() {

    function marcar(input, ok) {
        input.classList.remove("input-error", "input-ok");
        input.classList.add(ok ? "input-ok" : "input-error");
    }

    let usuario = document.getElementById("usuario");
    let pass = document.getElementById("password");
    let confirm = document.getElementById("confirmPassword");

    let dni = document.querySelector("input[placeholder='DNI']");
    let nombre = document.querySelector("input[placeholder='Nombre']");
    let apellido = document.querySelector("input[placeholder='Apellido']");

    let correo = document.querySelector("input[placeholder='Correo']");
    let correo2 = document.querySelector("input[placeholder='Confirmar Correo']");

    let empresa = document.getElementById("empresaSelect");
    let codigo = document.getElementById("codigoVerificacion").value.trim();
    console.log("codigo:", codigo);
    let captchaInput = document.getElementById("captchaInput");

    let captchaTexto = document.getElementById("captchaTexto").innerText;

     

    let valido = true;

    // vacíos
    [usuario, pass, confirm, dni, nombre, apellido, correo, correo2 ].forEach(i => {
        let ok = i.value.trim() !== "";
        marcar(i, ok);
        if (!ok) valido = false;
    });

    marcar(empresa, empresa.value !== "");
    if (!empresa.value) valido = false;

    // correo
    let correoOk = correo.value === correo2.value && correo.value !== "";
    marcar(correo, correoOk);
    marcar(correo2, correoOk);
    if (!correoOk) valido = false;

    // codigo de verificacion
    if (!codigo) {
        marcar(document.getElementById("codigoVerificacion"), false);
        valido = false;
    } else {
        marcar(document.getElementById("codigoVerificacion"), true);
    }

    // password reglas
    let passValido = pass.value.length >= 10 &&
        /[A-Z]/.test(pass.value) &&
        /[a-z]/.test(pass.value) &&
        /[0-9]/.test(pass.value) &&
        /[^A-Za-z0-9]/.test(pass.value);

    marcar(pass, passValido);
    if (!passValido) valido = false;

    // confirm password
    let match = pass.value === confirm.value && pass.value !== "";
    marcar(confirm, match);
    if (!match) valido = false;

    // captcha
    let captchaOk = captchaTexto === captchaInput.value.toUpperCase();
    marcar(captchaInput, captchaOk);
    if (!captchaOk) valido = false;

    if (!valido) {
        return; // ❌ no avanzar si hay errores
    }

    // ✅ SOLO si todo está correcto
    fetch("/registrar_admin", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            usuario: usuario.value,
            password: pass.value,
            dni: dni.value,
            nombre: nombre.value,
            apellido: apellido.value,
            correo: correo.value,
            empresa: empresa.value,
            codigo: codigo
        })
    })
    .then(res => res.json().then(data => ({ status: res.status, body: data })))
    .then(res => {

        alert(res.body.mensaje);

        if (res.status === 200) {

            // cerrar modal
            let modal = bootstrap.Modal.getInstance(document.getElementById('modalRegistro'));
            modal.hide();

            // redirigir a login
            window.location.href = "/login";
        }

    })
    .catch(err => {
        console.error(err);
        alert("Error en el registro");
    });
});
</script>

</body>
</html>
