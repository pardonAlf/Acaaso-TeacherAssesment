{% extends "base.html" %}

{% block title %}Panel Profesor{% endblock %}

{% block content %}

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="titulo">Mis Quizzes</h5>
            <button class="btn btn-primary btn-sm" onclick="crearQuiz()">+ Crear</button>
        </div>

        <!-- ACCIONES -->
        <div class="acciones mb-2">
            <button onclick="crearQuiz()">Crear</button>
            <button onclick="entrarQuiz()">Entrar</button>
            <button onclick="generarCodigo()">Código</button>
            <button onclick="verResultados()">Resultados</button>
            <button class="danger" onclick="eliminarQuiz()">Eliminar</button>
            <button onclick="generarReporte()">Exportar Quiz</button>
        </div>

        <!-- TABLA -->
        <div class="table-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th></th>
                        <th>ID</th>
                        <th>Título</th>
                        
                        <th>Alumnos</th>
                        <th>Preguntas</th>
                        <th>Código</th>
                    </tr>
                </thead>

                <tbody>
                    {% for q in quizzes %}
                    <tr>
                        <td>
                            <input type="radio" name="quiz_id" value="{{ q[0] }}">
                        </td>
                        <td>{{ q[0] }}</td>
                        <td>{{ q[1] }}</td>
                        <td>{{ q[2] }}</td>
                        <td>{{ q[3] }}</td>
                        <td>
                            {% if q[4] %}
                                <span class="badge-ok">{{ q[4] }}</span>
                            {% else %}
                                <span class="badge-off">—</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>
 

    <script>

        function generarReporte() {
            let id = obtenerSeleccionado();
            if (id) {
                window.open("/reporte_quiz/" + id, "_blank");
            }
        }

        function obtenerSeleccionado() {
            let seleccionado = document.querySelector('input[name="quiz_id"]:checked');

            if (!seleccionado) {
                alert("Selecciona un quiz primero");
                return null;
            }

            return seleccionado.value;
        }

        function crearQuiz() {
            window.location.href = "/crear_quiz";
        }

        function entrarQuiz() {
            let id = obtenerSeleccionado();
            if (id) {
                window.location.href = "/editar_quiz/" + id;
            }
        }
        function verResultados() {
            let id = obtenerSeleccionado();
            if (id) {
                window.location.href = "/resultados/" + id;
            }
        }

        function enviarQuiz() {
            let id = obtenerSeleccionado();
            if (id) {
                window.location.href = "/enviar_quiz/" + id;
            }
        }

        function generarCodigo() {
            let id = obtenerSeleccionado();
            if (id) {
                window.location.href = "/enviar_quiz/" + id;
            }
        }

        function obtenerQuizSeleccionado() {
            const seleccionado = document.querySelector('input[name="quiz_id"]:checked');
            if (!seleccionado) {
                alert("Selecciona un quiz primero");
                return null;
            }
            return seleccionado.value;
        }

        function editarQuiz() {
            const quizId = obtenerQuizSeleccionado();
            if (quizId) {
                window.location.href = `/editar_quiz/${quizId}`;
            }
        }
    </script>
    <script>
        function eliminarQuiz() {
            const seleccionado = document.querySelector('input[name="quiz_id"]:checked');

            if (!seleccionado) {
                alert("Selecciona un quiz");
                return;
            }

            const quizId = seleccionado.value;

            if (confirm("¿Seguro que quieres eliminar este quiz?")) {
                window.location.href = `/eliminar_quiz/${quizId}`;
            }
        }
    </script>

{% endblock %}
