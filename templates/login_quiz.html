<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso Quiz</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;

            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url("../static/img/login-quiz1.png");

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-login {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            width: 350px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-login h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="card-login">

        <h2>🎓 Acceso al Quiz</h2>
        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" id="formLogin">

            <input type="text" name="dni" id="dni" class="form-control mb-2" placeholder="DNI">
            <div id="loading" style="display:none; margin-top:5px;">
                <div style="
                    width:100%;
                    height:6px;
                    background:#e5e7eb;
                    border-radius:5px;
                    overflow:hidden;
                ">
                    <div id="progress" style="
                        height:100%;
                        width:0%;
                        background:#22c55e;
                        transition:width 1s linear;
                    "></div>
                </div>
            </div>

            <div id="extra_campos" style="display:none;">
                <input type="text" name="nombre" id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input type="text" name="apellido" id="apellido" class="form-control mb-2" placeholder="Apellido">
                <input type="email" name="correo" id="correo" class="form-control mb-2" placeholder="Correo">
            </div>

            <button id="btnIngresar" class="btn btn-primary" disabled>
                Ingresar
            </button>

        </form>

    </div>

    <script>
        let alumnoVerificado = false;

        document.getElementById("dni").addEventListener("blur", function() {
            const dni = this.value;

            if (!dni) return;

            alumnoVerificado = false;

            const loading = document.getElementById("loading");
            const progress = document.getElementById("progress");

            // 🔥 mostrar barra
            loading.style.display = "block";
            progress.style.width = "0%";

            // animación
            setTimeout(() => {
                progress.style.width = "100%";
            }, 50);

            // ⏱️ esperar 1 segundo (UX controlado)
            setTimeout(() => {

                fetch(`/buscar_alumno/${dni}`)
                    .then(res => res.json())
                    .then(data => {

                        alumnoVerificado = true;

                        const extra = document.getElementById("extra_campos");

                        const nombre = document.getElementById("nombre");
                        const apellido = document.getElementById("apellido");
                        const correo = document.getElementById("correo");

                        if (data.existe) {

                            nombre.value = data.nombre || "";
                            apellido.value = data.apellido || "";
                            correo.value = data.correo || "";

                            nombre.readOnly = true;
                            apellido.readOnly = true;

                            if (!data.correo) {
                                extra.style.display = "block";
                            } else {
                                extra.style.display = "none";
                            }

                        } else {

                            extra.style.display = "block";

                            nombre.readOnly = false;
                            apellido.readOnly = false;
                            correo.readOnly = false;

                            nombre.value = "";
                            apellido.value = "";
                            correo.value = "";
                        }

                        // 🔥 ocultar barra
                        loading.style.display = "none";
                        progress.style.width = "0%";
                        validarFormulario();
                    });

            }, 1000); // 1 segundo exacto
        });
        document.getElementById("dni").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                this.blur();
            }
        });
    
        document.querySelector("form").addEventListener("submit", function(e) {

            const extra = document.getElementById("extra_campos");

            // 🔴 si hay campos visibles → deben llenarse
            if (extra.style.display !== "none") {

                const nombre = document.getElementById("nombre").value.trim();
                const apellido = document.getElementById("apellido").value.trim();
                const correo = document.getElementById("correo").value.trim();

                if (!nombre || !apellido || !correo) {
                    e.preventDefault();
                    alert("Debes completar nombre, apellido y correo");
                }
            }
        });
        document.getElementById("dni").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                this.blur(); // fuerza la búsqueda primero
            }
        });
        function getMensaje(nota) {
            if (nota == 20) return "🎉 Excelente desempeño";
            if (nota >= 14) return "👍 Buen trabajo";
            return "📚 Puedes mejorar";
        }
     
    function validarFormulario() {
        const dni = document.getElementById("dni").value.trim();
        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const correo = document.getElementById("correo").value.trim();

        const extraVisible = document.getElementById("extra_campos").style.display !== "none";

        let valido = false;

        if (extraVisible) {
            // 🔴 necesita TODO
            valido = dni && nombre && apellido && correo;
        } else {
            // 🔴 SOLO si ya fue validado por backend
            valido = alumnoVerificado === true;
        }

        const btn = document.getElementById("btnIngresar");

        btn.disabled = !valido;

        // 🎨 cambio visual (UX)
        if (valido) {
            btn.classList.remove("btn-danger");
            btn.classList.add("btn-primary");
        } else {
            btn.classList.remove("btn-primary");
            btn.classList.add("btn-danger");
        }
    }
    // escuchar cambios
    document.querySelectorAll("#dni, #nombre, #apellido, #correo").forEach(input => {
        input.addEventListener("input", validarFormulario);
    });
     
    const formLogin = document.querySelector("#formLogin ");

    if (formLogin) {
        formLogin.addEventListener("submit", function(e) {
            const btn = document.getElementById("btnIngresar");

            if (btn && btn.disabled) {
                e.preventDefault();
            }
        });
    }

    document.querySelectorAll("#formLogin input").forEach(input => {
        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();

                const btn = document.getElementById("btnIngresar");

                if (btn && !btn.disabled) {
                    btn.click();
                }
            }
        });
    });
</script>

</body>
</html>
